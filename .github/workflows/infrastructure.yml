# Verifies that deployed cloud endpoints (Render) respond after infra-related changes.
#
# Setup (GitHub → Settings → Secrets and variables → Actions → Variables):
#   RENDER_API_URL       e.g. https://your-backend.onrender.com
#   RENDER_FRONTEND_URL  e.g. https://your-frontend.onrender.com
#
# Manual run: Actions → "Infrastructure verification" → Run workflow

name: Infrastructure verification

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/infrastructure.yml"
      - "infra/**"
      - "render.yaml"
      - "render.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/infrastructure.yml"
      - "infra/**"
      - "render.yaml"
      - "render.yml"
  workflow_dispatch:

jobs:
  verify-deployed-services:
    runs-on: ubuntu-latest
    steps:
      - name: Verify API (backend) is reachable
        env:
          URL: ${{ vars.RENDER_API_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::Set Actions variable RENDER_API_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          curl -fsS --max-time 60 "$URL/" -o /dev/null
          echo "OK: $URL/"

      - name: Verify frontend is reachable
        env:
          URL: ${{ vars.RENDER_FRONTEND_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "::error::Set Actions variable RENDER_FRONTEND_URL (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          curl -fsS --max-time 120 "$URL/" -o /dev/null
          echo "OK: $URL/"
